---
# Automation to monitor Zigbee device battery levels and send notifications
# when battery drops below 15%

alias: "Nízká baterie Zigbee zařízení"
description: "Monitoruje všechna Zigbee zařízení a upozorňuje na nízkou úroveň baterie (pod 15%)"

trigger:
  # Monitors state changes for all entities
  # Filtering to battery sensors done in condition
  - platform: event
    event_type: state_changed

condition:
  # Check if entity is a battery sensor
  - condition: template
    value_template: >
      {{ trigger.event.data.entity_id is defined and
         trigger.event.data.entity_id.startswith('sensor.') and
         trigger.event.data.entity_id.endswith('_battery') }}
  # Validate the new state is a valid number below 15%
  - condition: template
    value_template: >
      {% set new_state = trigger.event.data.new_state %}
      {{ new_state is not none and
         new_state.state not in ['unknown', 'unavailable', 'none'] and
         new_state.state | float(-1) >= 0 and
         new_state.state | float(-1) < 15 }}
  # Filter to only Zigbee devices by checking device integration
  - condition: template
    value_template: >
      {% set entity = trigger.event.data.entity_id %}
      {% set dev_id = device_id(entity) %}
      {% if dev_id %}
        {% set integrations = device_attr(dev_id, 'identifiers') | list %}
        {{ integrations | selectattr('0', 'in', ['zha', 'zigbee2mqtt']) | first is defined }}
      {% else %}
        false
      {% endif %}

action:
  - variables:
      entity: "{{ trigger.event.data.entity_id }}"
      battery_level: "{{ trigger.event.data.new_state.state }}"
      device_name: "{{ trigger.event.data.new_state.attributes.friendly_name | default(trigger.event.data.entity_id) }}"
      clean_tag: "{{ trigger.event.data.entity_id | regex_replace('sensor\\.|_battery', '') | regex_replace('[^a-zA-Z0-9_]', '_') }}"
  - service: notify.mobile_app_motorola_edge_50_pro
    data:
      title: "⚠️ Nízká baterie"
      message: "Zařízení {{ device_name }} má nízkou baterii: {{ battery_level }}%"
      data:
        notification_icon: mdi:battery-alert
        color: red
        clickAction: /
        tag: "battery_low_{{ clean_tag }}"
  # Wait 30 minutes before allowing this automation instance to process another trigger
  # This provides per-device debouncing when combined with mode: parallel
  - delay:
      minutes: 30

mode: parallel
max: 20
